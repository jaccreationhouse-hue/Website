    <div id="root"></div>

    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', async () => {
          try {
            const wasControlled = Boolean(navigator.serviceWorker.controller);
            const registrations = await navigator.serviceWorker.getRegistrations();
            await Promise.all(registrations.map((registration) => registration.unregister()));

            if ('caches' in window) {
              const cacheNames = await caches.keys();
              await Promise.all(cacheNames.map((cacheName) => caches.delete(cacheName)));
            }

            if (wasControlled && !sessionStorage.getItem('jac-service-worker-cleaned')) {
              sessionStorage.setItem('jac-service-worker-cleaned', 'true');
              window.location.reload();
            } else {
              sessionStorage.removeItem('jac-service-worker-cleaned');
            }
          } catch (error) {
            console.warn('Could not remove obsolete service worker data.', error);
          }
        });
      }
    </script>
